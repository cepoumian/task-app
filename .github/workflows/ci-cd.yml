# ============================================
# CI/CD Pipeline — Task App
# Se activa en cada push a main o develop
# ============================================

name: CI/CD Pipeline # Nombre que verás en GitHub → pestaña Actions

# ─── CUÁNDO SE ACTIVA ─────────────────────
on:
  push:
    branches:
      - main # Se ejecuta cuando haces push a main
      - develop # También en develop (para pruebas)
  pull_request:
    branches:
      - main # También en PRs hacia main (antes de mergear)

# ─── VARIABLES GLOBALES ───────────────────
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }} # Viene de GitHub Secrets
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/task-frontend
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/task-backend

# ─── JOBS (tareas) ────────────────────────
jobs:
  # ── JOB 1: Build y push de imágenes ─────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest # GitHub nos da una VM Ubuntu gratis

    steps:
      # 1. Descargar el código del repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Calcular el tag de la imagen
      # Usamos los primeros 7 caracteres del hash del commit
      # Ejemplo: task-frontend:a1b2c3d
      - name: Set image tag
        id: tag
        run: echo "SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # 3. Conectarse a Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Activar BuildKit (builder moderno de Docker, más rápido)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build y push del Frontend
      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./task-app-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.SHA }}

      # 6. Build y push del Backend
      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./task-app-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.SHA }}

      # 7. Mostrar resumen al final
      - name: Summary
        run: |
          echo "✅ Images pushed successfully!"
          echo "Frontend: ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.SHA }}"
          echo "Backend:  ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.SHA }}"
