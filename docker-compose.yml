version: '3.8'

services:

  # ─── Base de datos ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
    restart: unless-stopped

  # ─── Backend API ──────────────────────────
  backend:
    build:
      context:    ./task-app-backend
      dockerfile: Dockerfile
    container_name: task-backend
    environment:
      DB_HOST:     ${DB_HOST}
      DB_PORT:     ${DB_PORT}
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT:        ${PORT}
      NODE_ENV:    ${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────
  frontend:
    build:
      context:    ./task-app-frontend
      dockerfile: Dockerfile
    container_name: task-frontend
    depends_on:
      - backend
    networks:
      - frontend-net
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ──────────────────
  nginx:
    build:
      context:    ./nginx
      dockerfile: Dockerfile
    container_name: task-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-net
    restart: unless-stopped

# ─── Redes ────────────────────────────────
networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

# ─── Volúmenes ────────────────────────────
volumes:
  postgres-data: